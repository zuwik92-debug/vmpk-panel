<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie do panelu - VMPK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-image: url('tlo.jpg') !important; 
            background-size: cover; 
            background-position: center center; 
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 1; }
        .login-container { position: relative; z-index: 2; background: rgba(20, 20, 20, 0.85); padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; border: 1px solid #333; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { color: #fff; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #bbb; font-size: 12px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; background: #2b2b2b; border: 1px solid #444; color: #fff; border-radius: 4px; }
        button { width: 100%; padding: 12px; background-color: #007acc; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background-color: #0062a3; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="login-container">
        <h2>Logowanie do panelu</h2>
        <form id="login-form">
            <div class="input-group">
                <label>Nick</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label>Hasło</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Zaloguj się</button>
        </form>
    </div>
    <script>
        document.getElementById("login-form").addEventListener("submit", function(e) {
            e.preventDefault();
            localStorage.setItem("nick", document.getElementById("username").value);
            window.location.href = "panel.html";
        });
    </script>
</body>
</html>
