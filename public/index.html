<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie do panelu - VMPK</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            /* Wskazanie na Twój lokalny plik z jasnym autobusem */
            background-image: url('tlo.jpg') !important; 
            background-size: cover; 
            background-position: center center; 
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* Delikatne przyciemnienie tła pod okienkiem, żeby napisy były czytelne */
        .overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0, 0, 0, 0.3); 
            z-index: 1; 
        }
        
        /* Ciemne, nowoczesne okienko logowania z zaokrąglonymi rogami */
        .login-container { 
            position: relative; 
            z-index: 2; 
            background: rgba(20, 20, 20, 0.85); 
            padding: 40px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 420px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.6); 
        }
        
        h2 { 
            color: #fff; 
            margin-bottom: 25px; 
            font-size: 22px;
            font-weight: 600;
        }
        
        .input-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        
        .input-group label { 
            display: block; 
            color: #bbb; 
            font-size: 11px; 
            font-weight: bold; 
            margin-bottom: 6px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            background: #2b2b2b; 
            border: 1px solid #444; 
            color: #fff; 
            border-radius: 6px; 
            font-size: 14px;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #007acc;
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #007acc; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            font-size: 13px;
            margin-top: 10px;
        }
        
        button:hover { 
            background-color: #0062a3; 
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="login-container">
        <h2>Logowanie do panelu</h2>
        <form id="login-form">
            <div class="input-group">
                <label>Nick</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label>Hasło</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Zaloguj się</button>
        </form>
    </div>
    <script>
        document.getElementById("login-form").addEventListener("submit", function(e) {
            e.preventDefault();
            localStorage.setItem("nick", document.getElementById("username").value);
            window.location.href = "panel.html";
        });
    </script>
</body>
</html>
