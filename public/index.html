<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie do panelu - VMPK</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-image: url('tlo.jpg') !important; 
            background-size: cover; 
            background-position: center center; 
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* Środkowe, przezroczyste czarne okienko z zaokrąglonymi rogami i blurem */
        .login-container { 
            background: rgba(0, 0, 0, 0.55); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 40px 45px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 440px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        h2 { 
            color: #fff; 
            margin-bottom: 30px; 
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        .input-group { 
            margin-bottom: 22px; 
            text-align: left; 
        }
        
        .input-group label { 
            display: block; 
            color: #aaa; 
            font-size: 10px; 
            font-weight: bold; 
            margin-bottom: 6px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        
        /* Jasne, zaokrąglone pola wprowadzania danych */
        .input-group input { 
            width: 100%; 
            padding: 10px 12px; 
            background: #eef2f7; 
            border: none; 
            color: #000; 
            border-radius: 6px; 
            font-size: 14px;
        }
        
        .input-group input:focus {
            outline: none;
        }
        
        /* Przycisk jako wyśrodkowany, czysty tekst bez tła */
        button { 
            background: none;
            border: none;
            color: #fff; 
            font-size: 11px;
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            margin-top: 15px;
            transition: color 0.2s;
        }
        
        button:hover { 
            color: #ccc; 
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Logowanie do panelu</h2>
        <form id="login-form">
            <div class="input-group">
                <label>Nick</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label>Hasło</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Zaloguj się</button>
        </form>
    </div>
    <script>
        document.getElementById("login-form").addEventListener("submit", function(e) {
            e.preventDefault();
            localStorage.setItem("nick", document.getElementById("username").value);
            window.location.href = "panel.html";
        });
    </script>
</body>
</html>
