<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie do panelu</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #121212;
        }

        .container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* Lewa strona - Zdjęcie autobusu na pół ekranu */
        .left-side {
            flex: 1;
            background-image: url('tlo.jpg'); /* Wrzuć plik tlo.jpg do folderu public */
            background-size: cover;
            background-position: center;
            background-color: #1a1a1a;
        }

        /* Prawa strona - Logowanie do panelu */
        .right-side {
            flex: 1;
            background-color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            color: white;
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 14px;
            color: #aaa;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 2rem;
        }

        .btn-login {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 24px;
            font-size: 14px;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
        }

        .forgot-pass {
            color: white;
            text-decoration: none;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        #status {
            margin-top: 15px;
            color: #ff6b6b;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-side"></div>
        <div class="right-side">
            <div class="login-box">
                <h2>Logowanie do panelu</h2>
                
                <div class="input-group">
                    <label>Nick:</label>
                    <input type="text" id="nick" autocomplete="off">
                </div>

                <div class="input-group">
                    <label>Hasło:</label>
                    <input type="password" id="haslo">
                </div>

                <div class="actions">
                    <button class="btn-login" onclick="login()">Zaloguj się</button>
                    <a href="#" class="forgot-pass">Zapomniałem hasła</a>
                </div>

                <p id="status"></p>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const nick = document.getElementById("nick").value;
            const haslo = document.getElementById("haslo").value;
            const status = document.getElementById("status");

            if(!nick || !haslo) {
                status.innerText = "Uzupełnij wszystkie pola!";
                return;
            }

            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nick, haslo })
            });

            const data = await res.json();

            if (data.success) {
                localStorage.setItem("nick", nick);
                window.location.href = "panel.html";
            } else {
                status.innerText = "Błędny nick lub hasło!";
            }
        }
    </script>
</body>
</html>
