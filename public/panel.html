<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kierowcy</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            padding: 20px;
        }
        input, select {
            display: block;
            margin: 10px 0;
            padding: 10px;
            width: 100%;
            max-width: 300px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Zarządzanie Grafikami</h2>
    <p>Zalogowano jako: <b id="user-display"></b></p>

    <input type="text" id="kierowca-nick" placeholder="Nick kierowcy">
    <input type="text" id="kierowca-linia" placeholder="Linia">
    
    <select id="kierowca-zmiana">
        <option value="A">Zmiana A</option>
        <option value="B">Zmiana B</option>
        <option value="C">Zmiana C</option>
    </select>

    <input type="text" id="kierowca-autobus" placeholder="Numer taborowy">

    <button onclick="zapiszGrafik()">Zapisz Grafik</button>
    <p id="status"></p>

    <br><br>
    <button onclick="wyloguj()" style="background-color: #dc3545;">Wyloguj się</button>

    <script>
        const zalogowany = localStorage.getItem("nick");
        if(!zalogowany) {
            window.location.href = "index.html";
        } else {
            document.getElementById("user-display").innerText = zalogowany;
        }

        async function zapiszGrafik() {
            const nick = document.getElementById("kierowca-nick").value;
            const linia = document.getElementById("kierowca-linia").value;
            const zmiana = document.getElementById("kierowca-zmiana").value;
            const autobus = document.getElementById("kierowca-autobus").value;

            const res = await fetch("/grafik", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nick, linia, zmiana, autobus })
            });

            const data = await res.json();
            if(data.success) {
                document.getElementById("status").innerText = "Zapisano pomyślnie!";
            }
        }

        function wyloguj() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
