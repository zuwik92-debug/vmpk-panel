<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kierowcy - VMPK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; width: 100vw; overflow: hidden; background-color: #121212; color: #fff; }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 260px; background-color: #161616; padding: 30px 20px; display: flex; flex-direction: column; gap: 30px; border-right: 1px solid #222; }
        .menu-list { display: flex; flex-direction: column; gap: 12px; list-style: none; }
        .menu-item button { width: 100%; background-color: #2a2a2a; color: #fff; border: none; padding: 12px 15px; text-align: left; border-radius: 4px; cursor: pointer; }
        .menu-item button:hover { background-color: #3a3a3a; }
        .btn-logout { background-color: #4a2323 !important; }
        .main-content { flex-grow: 1; background-color: #0c0c0c; padding: 50px; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>VMPK</h2>
            <ul class="menu-list">
                <li class="menu-item"><button onclick="window.location.reload()">🏠 Strona główna</button></li>
                <li class="menu-item"><button onclick="window.location.href='grafik.html'">📅 Grafik</button></li>
                <li class="menu-item"><button class="btn-logout" onclick="localStorage.removeItem('nick'); window.location.href='index.html'">🚪 Wyloguj</button></li>
            </ul>
        </aside>
        <main class="main-content">
            <h1>Siema kierowco! 👋</h1>
            <p>Zalogowany jako: <span id="user-info"></span></p>
        </main>
    </div>
    <script>
        const user = localStorage.getItem("nick");
        if (!user) window.location.href = "index.html";
        else document.getElementById("user-info").innerText = user;
    </script>
</body>
</html>
