<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabor - VMPK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; width: 100vw; overflow: hidden; background-color: #121212; color: #fff; }
        
        .app-container { display: flex; height: 100vh; }
        
        /* Panel boczny */
        .sidebar { width: 260px; background-color: #161616; padding: 30px 20px; display: flex; flex-direction: column; gap: 30px; border-right: 1px solid #222; flex-shrink: 0; overflow-y: auto; }
        .sidebar h2 { font-size: 26px; font-weight: bold; color: #fff; letter-spacing: 1px; }
        .menu-list { display: flex; flex-direction: column; gap: 12px; list-style: none; }
        .menu-item button { width: 100%; background-color: #2a2a2a; color: #fff; border: none; padding: 12px 15px; text-align: left; border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; transition: background 0.2s; }
        .menu-item button:hover { background-color: #333; }
        .menu-item button.active { background-color: #3a3a3a; border-left: 4px solid #007acc; padding-left: 11px; }
        
        .btn-admin { border-left: 4px solid #ff9800 !important; background-color: #2e2416 !important; color: #ff9800 !important; display: none; }
        .btn-admin:hover { background-color: #42331f !important; }
        .btn-logout { background-color: #4a2323 !important; }
        .btn-logout:hover { background-color: #632d2d !important; }

        /* Główna sekcja */
        .main-content { flex-grow: 1; background-color: #0c0c0c; padding: 40px; display: flex; flex-direction: column; gap: 20px; overflow: hidden; }
        .header-section { margin-bottom: 10px; }
        .header-section h1 { font-size: 24px; text-transform: uppercase; margin-bottom: 5px; }
        .header-section p { color: #888; font-size: 14px; }

        /* Siatka kart */
        .tabor-grid { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding-bottom: 20px; }
        
        /* Styl karty pojazdu */
        .bus-card { background: #161616; border: 1px solid #222; border-radius: 6px; padding: 22px; display: flex; flex-direction: column; gap: 8px; transition: transform 0.2s, border-color 0.2s; }
        .bus-card:hover { transform: translateY(-3px); border-color: #007acc; }
        
        .bus-number { font-size: 22px; font-weight: bold; color: #ff9800; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 4px; }
        .bus-info { font-size: 14px; color: #ccc; line-height: 1.4; }
        .bus-info span { color: #888; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>VMPK</h2>
            <ul class="menu-list">
                <li class="menu-item"><button onclick="window.location.href='panel.html'">🏠 Strona główna</button></li>
                <li class="menu-item"><button onclick="window.location.href='grafik.html'">📅 Grafik</button></li>
                <li class="menu-item"><button class="active" onclick="window.location.reload()">🚌 Tabor</button></li>
                <li class="menu-item"><button onclick="otworzOpcje('GODZINY ZMIAN')">⏱️ Godziny zmian</button></li>
                
                <!-- Poprawione przekierowanie do sklepu -->
                <li class="menu-item"><button onclick="window.location.href='sklep.html'">🛒 Sklep</button></li>
                <li class="menu-item"><button onclick="otworzOpcje('RAPORTY')">📊 Raporty</button></li>
                <li class="menu-item"><button onclick="otworzOpcje('ZGŁOSZENIA')">⚠️ Zgłoszenia</button></li>
                <li class="menu-item"><button onclick="otworzOpcje('WNIOSKI')">📝 Wnioski</button></li>
                
                <li class="menu-item" id="admin-menu-item"><button class="btn-admin" onclick="window.location.href='zarzadzaj.html'">✍️ Zarządzaj grafikiem</button></li>
                
                <li class="menu-item"><button class="btn-logout" onclick="localStorage.removeItem('nick'); window.location.href='index.html'">🚪 Wyloguj</button></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="header-section">
                <h1>Spis Taboru VMPK Kłosok</h1>
                <p>Pełna lista autobusów znajdujących się na stanie przedsiębiorstwa.</p>
            </div>

            <div class="tabor-grid" id="tabor-container"></div>
        </main>
    </div>

    <script>
        const user = localStorage.getItem("nick");
        if (!user) { window.location.href = "index.html"; }

        if (user === "admin" || user === "Ksawery" || user === "Michał" || user === "Maciek") {
            document.querySelector(".btn-admin").style.display = "flex";
        }

        function otworzOpcje(nazwa) {
            alert(`Opcja "${nazwa}" jest obecnie w przygotowaniu.`);
        }

        const autobusy = [
            { nr: "001", model: "Solaris Urbino III 18m ACTIA E6" },
            { nr: "003", model: "Solaris Urbino III 18m MOKI E6 (SOBOL) / ACTIA E6 (MEGAPACK)" },
            { nr: "006", model: "Solaris Urbino III 18m MOKI E6 (SOBOL) / ACTIA E6 (MEGAPACK)" },
            { nr: "008", model: "Solaris Urbino III 18m ACTIA E6" },
            { nr: "019", model: "Solaris Urbino III 15m ACTIA E6" },
            { nr: "020", model: "Solaris Urbino III 10m MOKI E6 (SOBOL) / ACTIA (MEGAPACK)" },
            { nr: "021", model: "Solaris Urbino III 10m MOKI E6 (SOBOL) / ACTIA (MEGAPACK)" },
            { nr: "022", model: "Solaris Urbino III 12m MOKI E6 (SOBOL) / ACTIA E6 (MEGAPACK)" },
            { nr: "023", model: "Solaris Urbino III 12m MOKI E6 (SOBOL) / ACTIA E6 (MEGAPACK)" },
            { nr: "024", model: "Solaris Urbino III 12m ACTIA E6" },
            { nr: "025", model: "Solaris Urbino III 12m MOKI E6 (SOBOL) / ACTIA E6 (MEGAPACK)" },
            { nr: "026", model: "Solaris Urbino III 12m MOKI E6 (SOBOL) / ACTIA E6 (MEGAPACK)" },
            { nr: "027", model: "Solaris Urbino III 12m ACTIA E6" },
            { nr: "028", model: "Solaris Urbino III 12m MOKI E6 (SOBOL) / ACTIA E6 (MEGAPACK)" },
            { nr: "029", model: "Solaris Urbino III 12m ACTIA E6" },
            { nr: "030", model: "Solaris Urbino III 12m MOKI E6 (SOBOL) / ACTIA E6 (MEGAPACK)" },
            { nr: "031", model: "Solaris Urbino III 12m ACTIA E6" },
            { nr: "057", model: "Solaris Urbino III 18m ACTIA E6" },
            { nr: "058", model: "Solaris Urbino III 18m ACTIA E6" },
            { nr: "059", model: "Solaris Urbino III 18m ACTIA E6" },
            { nr: "060", model: "Solaris Urbino III 18m ACTIA E6" }
        ];

        function wyswietlTabor() {
            const container = document.getElementById("tabor-container");
            container.innerHTML = "";

            autobusy.forEach(bus => {
                container.innerHTML += `
                    <div class="bus-card">
                        <div class="bus-number">#${bus.nr}</div>
                        <div class="bus-info">
                            <span>Model:</span> ${bus.model}
                        </div>
                    </div>
                `;
            });
        }

        wyswietlTabor();
    </script>
</body>
</html>
