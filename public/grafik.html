<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafik Kierowców - VMPK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; width: 100vw; overflow: hidden; background-color: #121212; color: #fff; }
        
        .app-container { display: flex; height: 100vh; }
        
        /* Panel boczny */
        .sidebar { width: 260px; background-color: #161616; padding: 30px 20px; display: flex; flex-direction: column; gap: 30px; border-right: 1px solid #222; flex-shrink: 0; }
        .menu-list { display: flex; flex-direction: column; gap: 12px; list-style: none; }
        .menu-item button { width: 100%; background-color: #2a2a2a; color: #fff; border: none; padding: 12px 15px; text-align: left; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .menu-item button:hover, .menu-item button.active { background-color: #3a3a3a; border-left: 4px solid #007acc; padding-left: 11px; }
        .btn-logout { background-color: #4a2323 !important; }
        .btn-logout:hover { background-color: #632d2d !important; }

        /* Główna sekcja */
        .main-content { flex-grow: 1; background-color: #0c0c0c; padding: 30px; display: flex; flex-direction: column; overflow: hidden; }
        .header-section { margin-bottom: 20px; }
        .header-section h1 { font-size: 24px; margin-bottom: 5px; color: #fff; text-transform: uppercase; }
        .header-section p { color: #888; font-size: 14px; }

        /* Kontener tabeli z przewijaniem */
        .table-container { flex-grow: 1; overflow: auto; background-color: #161616; border: 1px solid #222; border-radius: 6px; }
        
        /* Styl tabeli grafiku */
        table { border-collapse: collapse; width: 100%; text-align: center; font-size: 13px; table-layout: auto; }
        
        /* Nagłówki (Kierowcy) - zapobiega ściskaniu przy dużej ilości osób */
        th { 
            background-color: #1f1f1f; 
            color: #007acc; 
            font-weight: bold; 
            padding: 14px 12px; 
            border: 1px solid #2a2a2a; 
            position: sticky; 
            top: 0; 
            z-index: 2; 
            white-space: nowrap; /* Blokada łamania tekstu w komórce */
            min-width: 150px;    /* Gwarantowana szerokość kolumny kierowcy */
        }
        
        /* Pierwsza kolumna nagłówka (Dzień miesiąca) */
        th:first-child { 
            position: sticky; 
            left: 0; 
            background-color: #1f1f1f; 
            z-index: 3; 
            color: #fff; 
            width: 160px; 
            min-width: 160px;
        }

        /* Wiersze (Dni i komórki na służby) */
        td { 
            padding: 10px; 
            border: 1px solid #2a2a2a; 
            background-color: #161616; 
            color: #ccc; 
            height: 48px; 
            white-space: nowrap; 
        }
        tr:hover td { background-color: #1c1c1c; }
        
        /* Pierwsza kolumna (Dni miesiąca) - zablokowana przy przewijaniu w bok */
        td:first-child { 
            position: sticky; 
            left: 0; 
            background-color: #1a1a1a; 
            font-weight: bold; 
            color: #fff; 
            text-align: left; 
            padding-left: 15px; 
            border-right: 2px solid #2a2a2a; 
        }

        /* Weekend wyróżniony na czerwono */
        .weekend td:first-child { color: #ff4d4d; }
        .weekend td { background-color: #1a1515; }

        /* Konstrukcja komórek służb */
        .duty { display: block; background-color: #262626; padding: 5px 8px; border-radius: 4px; font-size: 11px; border: 1px solid #3a3a3a; color: #e0e0e0; margin: 2px auto; width: max-content; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>VMPK</h2>
            <ul class="menu-list">
                <li class="menu-item"><button onclick="window.location.href='panel.html'">🏠 Strona główna</button></li>
                <li class="menu-item"><button class="active" onclick="window.location.reload()">📅 Grafik</button></li>
                <li class="menu-item"><button class="btn-logout" onclick="localStorage.removeItem('nick'); window.location.href='index.html'">🚪 Wyloguj</button></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="header-section">
                <h1 id="dynamic-title">GRAFIK VMPK KŁOSOK — ...</h1>
                <p>Zalogowany jako: <span id="user-info" style="color: #007acc; font-weight: bold;">kierowca</span></p>
            </div>

            <div class="table-container">
                <table id="grafik-table">
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // Sprawdzenie sesji użytkownika
        const user = localStorage.getItem("nick");
        if (!user) { window.location.href = "index.html"; } else { document.getElementById("user-info").innerText = user; }

        // Kompletna lista Twoich kierowców z numerami służbowymi
        const kierowcy = [
            "Ksawery (42069)",
            "Michał (57137)",
            "Adam (1111)",
            "Adam (57771)",
            "Damian (7902)",
            "Dawid (50555)",
            "Dominik (2712)",
            "Elnur (47601)",
            "Jakub (23801)",
            "Jakub (37192)",
            "Kamil (3617)",
            "Maciek (5355)",
            "Mikołaj (433)",
            "Miłosz (65420)",
            "Oskar (57123)",
            "Sebastian (2347)",
            "Szymon (78102)",
            "Wojtek (57812)",
            "Xawery (56459)"
        ];

        const nazwyMiesiecy = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
        const dniTygodnia = ["niedziela", "poniedziałek", "wtorek", "środa", "czwartek", "piątek", "sobota"];

        let aktualnyMiesiac = -1;

        function generujGrafik() {
            const teraz = new Date();
            const rok = teraz.getFullYear();
            const miesiacIdx = teraz.getMonth();

            if (miesiacIdx === aktualnyMiesiac) return;
            aktualnyMiesiac = miesiacIdx;

            document.getElementById("dynamic-title").innerText = `GRAFIK VMPK KŁOSOK — ${nazwyMiesiecy[miesiacIdx]} ${rok}`;

            const thead = document.getElementById("table-head");
            let headHtml = `<tr><th>Dzień miesiąca</th>`;
            kierowcy.forEach(kierowca => {
                headHtml += `<th>${kierowca}</th>`;
            });
            headHtml += `</tr>`;
            thead.innerHTML = headHtml;

            const liczbaDni = new Date(rok, miesiacIdx + 1, 0).getDate();
            const tbody = document.getElementById("table-body");
            let bodyHtml = "";

            for (let dzien = 1; dzien <= liczbaDni; dzien++) {
                const dataDnia = new Date(rok, miesiacIdx, dzien);
                const dzienTygodniaIdx = dataDnia.getDay();
                const czyWeekend = (dzienTygodniaIdx === 0 || dzienTygodniaIdx === 6);
                const klasaWiersza = czyWeekend ? ' class="weekend"' : '';

                bodyHtml += `<tr${klasaWiersza}>`;
                bodyHtml += `<td>${dzien} ${dniTygodnia[dzienTygodniaIdx]}</td>`;
                kierowcy.forEach(() => {
                    bodyHtml += `<td></td>`;
                });
                bodyHtml += `</tr>`;
            }
            tbody.innerHTML = bodyHtml;
        }

        generujGrafik();
        setInterval(generujGrafik, 10000); // Sprawdza czas rzeczywisty co 10 sekund
    </script>
</body>
</html>
