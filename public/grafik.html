<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafik Kierowców - VMPK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; width: 100vw; overflow: hidden; background-color: #121212; color: #fff; }
        
        .app-container { display: flex; height: 100vh; }
        
        /* Panel boczny */
        .sidebar { width: 260px; background-color: #161616; padding: 30px 20px; display: flex; flex-direction: column; gap: 30px; border-right: 1px solid #222; flex-shrink: 0; }
        .menu-list { display: flex; flex-direction: column; gap: 12px; list-style: none; }
        .menu-item button { width: 100%; background-color: #2a2a2a; color: #fff; border: none; padding: 12px 15px; text-align: left; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .menu-item button:hover, .menu-item button.active { background-color: #3a3a3a; border-left: 4px solid #007acc; padding-left: 11px; }
        .btn-logout { background-color: #4a2323 !important; }
        .btn-logout:hover { background-color: #632d2d !important; }

        /* Główna sekcja */
        .main-content { flex-grow: 1; background-color: #0c0c0c; padding: 30px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .header-section { margin-bottom: 20px; }
        .header-section h1 { font-size: 24px; margin-bottom: 5px; color: #fff; text-transform: uppercase; }
        .header-section p { color: #888; font-size: 14px; }

        /* Kontener tabeli z przewijaniem */
        .table-container { flex-grow: 1; overflow: auto; background-color: #161616; border: 1px solid #222; border-radius: 6px; margin-bottom: 60px; }
        
        /* Styl tabeli grafiku */
        table { border-collapse: collapse; width: 100%; min-width: 1400px; text-align: center; font-size: 13px; }
        
        /* Nagłówki (Kierowcy) - zablokowane na górze przy przewijaniu */
        th { background-color: #1f1f1f; color: #007acc; font-weight: bold; padding: 12px 15px; border: 1px solid #2a2a2a; position: sticky; top: 0; z-index: 2; }
        th:first-child { position: sticky; left: 0; background-color: #1f1f1f; z-index: 3; color: #fff; width: 160px; }

        /* Wiersze (Dni) */
        td { padding: 10px; border: 1px solid #2a2a2a; background-color: #161616; color: #ccc; height: 45px; }
        tr:hover td { background-color: #1c1c1c; }
        
        /* Pierwsza kolumna (Dni miesiąca) - zablokowana przy przewijaniu w bok */
        td:first-child { position: sticky; left: 0; background-color: #1a1a1a; font-weight: bold; color: #fff; text-align: left; padding-left: 15px; border-right: 2px solid #2a2a2a; }

        /* Weekend wyróżniony na czerwono */
        .weekend td:first-child { color: #ff4d4d; }
        .weekend td { background-color: #1a1515; }

        /* KONTENER TESTOWY NA DOLE STRONY */
        .test-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #222;
            border-top: 2px solid #ff9800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            z-index: 10;
            font-size: 13px;
        }
        .test-panel input, .test-panel button {
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
        }
        .test-panel button {
            background: #ff9800;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        #current-sim-time {
            color: #ff9800;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>VMPK</h2>
            <ul class="menu-list">
                <li class="menu-item"><button onclick="window.location.href='panel.html'">🏠 Strona główna</button></li>
                <li class="menu-item"><button class="active" onclick="window.location.reload()">📅 Grafik</button></li>
                <li class="menu-item"><button class="btn-logout" onclick="localStorage.removeItem('nick'); window.location.href='index.html'">🚪 Wyloguj</button></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="header-section">
                <h1 id="dynamic-title">GRAFIK VMPK KŁOSOK — ...</h1>
                <p>Zalogowany jako: <span id="user-info" style="color: #007acc; font-weight: bold;">kierowca</span></p>
            </div>

            <div class="table-container">
                <table id="grafik-table">
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>

            <div class="test-panel">
                <span>🛠️ TRYB TESTOWY DATA:</span>
                <input type="date" id="test-date" value="2026-06-30">
                <input type="time" id="test-time" value="23:59">
                <button onclick="uruchomTest()">Ustaw czas i testuj</button>
                <span>Obecny czas systemu: <span id="current-sim-time">Brak (Czas realny)</span></span>
            </div>
        </main>
    </div>

    <script>
        // Sprawdzenie sesji użytkownika
        const user = localStorage.getItem("nick");
        if (!user) { window.location.href = "index.html"; } else { document.getElementById("user-info").innerText = user; }

        const kierowcy = ["3671 Szary.cj", "2476 Kishimuraa", "4048 Kulis", "4519 oskar778", "4589 kwaczlis", "1915 krzychoonline", "1961 Typowy Warszawiak"];
        const nazwyMiesiecy = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
        const dniTygodnia = ["niedziela", "poniedziałek", "wtorek", "środa", "czwartek", "piątek", "sobota"];

        let aktualnyMiesiac = -1;
        let wirtualnyCzas = null; // Przechowuje czas testowy

        function pobierzAktualnyCzas() {
            if (wirtualnyCzas) {
                // Dodajemy 1 sekundę przy każdym wywołaniu zegara w tle (wywoływany co 1 sek)
                wirtualnyCzas.setSeconds(wirtualnyCzas.getSeconds() + 1);
                
                // Pokazujemy wirtualny zegar w panelu testowym
                document.getElementById("current-sim-time").innerText = wirtualnyCzas.toLocaleString('pl-PL');
                return wirtualnyCzas;
            }
            document.getElementById("current-sim-time").innerText = "Czas realny komputera";
            return new Date();
        }

        function generujGrafik() {
            const teraz = pobierzAktualnyCzas();
            const rok = teraz.getFullYear();
            const miesiacIdx = teraz.getMonth();

            // Jeżeli miesiąc się nie zmienił, nie przeładowuj tabeli
            if (miesiacIdx === aktualnyMiesiac) return;
            aktualnyMiesiac = miesiacIdx;

            // Czyszczenie i budowanie na nowo
            document.getElementById("dynamic-title").innerText = `GRAFIK VMPK KŁOSOK — ${nazwyMiesiecy[miesiacIdx]} ${rok}`;

            const thead = document.getElementById("table-head");
            let headHtml = `<tr><th>Dzień miesiąca</th>`;
            kierowcy.forEach(k => headHtml += `<th>${k}</th>`);
            headHtml += `</tr>`;
            thead.innerHTML = headHtml;

            const liczbaDni = new Date(rok, miesiacIdx + 1, 0).getDate();
            const tbody = document.getElementById("table-body");
            let bodyHtml = "";

            for (let dzien = 1; dzien <= liczbaDni; dzien++) {
                const dataDnia = new Date(rok, miesiacIdx, dzien);
                const dzienTygodniaIdx = dataDnia.getDay();
                const czyWeekend = (dzienTygodniaIdx === 0 || dzienTygodniaIdx === 6);
                const klasaWiersza = czyWeekend ? ' class="weekend"' : '';

                bodyHtml += `<tr${klasaWiersza}>`;
                bodyHtml += `<td>${dzien} ${dniTygodnia[dzienTygodniaIdx]}</td>`;
                kierowcy.forEach(() => bodyHtml += `<td></td>`);
                bodyHtml += `</tr>`;
            }
            tbody.innerHTML = bodyHtml;
        }

        // Funkcja aktywowana przyciskiem z panelu testowego
        function uruchomTest() {
            const dVal = document.getElementById("test-date").value; // np. "2026-06-30"
            const tVal = document.getElementById("test-time").value; // np. "23:59"
            
            if(!dVal || !tVal) return alert("Wybierz poprawną datę i godzinę!");
            
            // Tworzymy dokładny obiekt daty z pól formularza
            wirtualnyCzas = new Date(`${dVal}T${tVal}:00`);
            
            // Resetujemy flagę miesiąca, żeby zmusić skrypt do natychmiastowego odświeżenia widoku
            aktualnyMiesiac = -1; 
            generujGrafik();
        }

        // Zegar tyka i sprawdza warunki co 1 sekundę (dla płynności testu)
        generujGrafik();
        setInterval(generujGrafik, 1000);
    </script>
</body>
</html>
